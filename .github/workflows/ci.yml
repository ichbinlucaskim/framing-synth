name: CI

# Polyrepo CI: framing-synth depends on the aec-schema JSON-Schema contract.
# Locally the repos sit side-by-side and we use `pip install -e ../aec-schema`.
# CI recreates that layout by checking out this repo and the contract repo into
# sibling paths, with the contract PINNED to tag v0.1.0 (see aec-schema ADR).
# Public repos -> no PAT needed for the second checkout.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout framing-synth
        uses: actions/checkout@v4
        with:
          path: framing-synth

      - name: Checkout aec-schema contract (pinned)
        uses: actions/checkout@v4
        with:
          repository: ichbinlucaskim/aec-schema
          ref: v0.1.0
          path: aec-schema

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Order matters: aec-schema is not on PyPI, so the editable contract must be
      # in the env before installing framing-synth (lists aec-schema>=0.1.0).
      - name: Install aec-schema (contract, pinned v0.1.0)
        working-directory: framing-synth
        run: pip install -e ../aec-schema

      - name: Install framing-synth
        working-directory: framing-synth
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: framing-synth
        run: ruff check src/ tests/

      - name: Test
        working-directory: framing-synth
        run: python -m pytest tests/ -v
